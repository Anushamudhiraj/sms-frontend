<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Sign Up | SocialManager Pro</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Manrope:wght@600;700;800&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#031635", // Navy blue
                        "surface": "#fbf8fc",
                        "on-surface": "#1b1b1e",
                        "outline-variant": "#e5e7eb", // Light gray
                        "background": "#fbf8fc"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "lg": "24px",
                        "xl": "32px",
                        "md": "16px",
                        "sm": "8px",
                        "xs": "4px"
                    },
                    "fontFamily": {
                        "headline": ["Manrope", "sans-serif"],
                        "body": ["Inter", "sans-serif"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="bg-background text-on-surface min-h-screen flex items-center justify-center p-md">
<main class="w-full max-w-[440px]">
<!-- Signup Card -->
<div class="bg-white rounded-xl shadow-[0px_1px_3px_rgba(0,0,0,0.1),0px_1px_2px_rgba(0,0,0,0.06)] border border-outline-variant p-xl flex flex-col gap-xl">
<!-- Heading -->
<div class="flex flex-col gap-xs">
<h2 class="font-headline text-[24px] font-bold text-primary">Sign Up</h2>
</div>
<!-- Form -->
<form class="flex flex-col gap-lg">
<!-- Inputs Stack -->
<div class="flex flex-col gap-md">
<!-- Full Name -->
<div class="flex flex-col gap-1.5">
<label class="text-[13px] font-medium text-on-surface/80" for="fullname">Full name</label>
<input class="w-full h-11 px-md border border-outline-variant rounded-lg text-body-md focus:ring-2 focus:ring-primary/5 focus:border-primary transition-all bg-white outline-none placeholder:text-slate-400" id="fullname" placeholder="John Doe" type="text"/>
</div>
<!-- Email -->
<div class="flex flex-col gap-1.5">
<label class="text-[13px] font-medium text-on-surface/80" for="email">Email</label>
<input class="w-full h-11 px-md border border-outline-variant rounded-lg text-body-md focus:ring-2 focus:ring-primary/5 focus:border-primary transition-all bg-white outline-none placeholder:text-slate-400" id="email" placeholder="john@agency.com" type="email"/>
</div>
<!-- Password -->
<div class="flex flex-col gap-1.5">
<label class="text-[13px] font-medium text-on-surface/80" for="password">Password</label>
<input class="w-full h-11 px-md border border-outline-variant rounded-lg text-body-md focus:ring-2 focus:ring-primary/5 focus:border-primary transition-all bg-white outline-none placeholder:text-slate-400" id="password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Platform Selection -->
<div class="flex flex-col gap-md">
<h3 class="text-[13px] font-medium text-on-surface/80">Select platforms</h3>
<div class="grid grid-cols-2 gap-sm"><button class="flex items-center gap-2.5 px-md py-sm border border-outline-variant rounded-lg hover:border-slate-400 hover:bg-slate-50 transition-all text-left" type="button">
<svg class="w-[20px] h-[20px]" fill="none" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path clip-rule="evenodd" d="M12 7C9.23858 7 7 9.23858 7 12C7 14.7614 9.23858 17 12 17C14.7614 17 17 14.7614 17 12C17 9.23858 14.7614 7 12 7ZM12 15.5C10.067 15.5 8.5 13.933 8.5 12C8.5 10.067 10.067 8.5 12 8.5C13.933 8.5 15.5 10.067 15.5 12C15.5 13.933 13.933 15.5 12 15.5Z" fill="url(#paint0_linear)" fill-rule="evenodd"></path><path clip-rule="evenodd" d="M17.33 3H6.67C4.64 3 3 4.64 3 6.67V17.33C3 19.36 4.64 21 6.67 21H17.33C19.36 21 21 19.36 21 17.33V6.67C21 4.64 19.36 3 17.33 3ZM19 17.33C19 18.25 18.25 19 17.33 19H6.67C5.75 19 5 18.25 5 17.33V6.67C5 5.75 5.75 5 6.67 5H17.33C18.25 5 19 5.75 19 6.67V17.33Z" fill="url(#paint1_linear)" fill-rule="evenodd"></path><circle cx="17" cy="7" fill="url(#paint2_linear)" r="1"></circle><defs><lineargradient gradientunits="userSpaceOnUse" id="paint0_linear" x1="7" x2="17" y1="17" y2="7"><stop stop-color="#F58529"></stop><stop offset="0.5" stop-color="#DD2A7B"></stop><stop offset="1" stop-color="#8134AF"></stop></lineargradient><lineargradient gradientunits="userSpaceOnUse" id="paint1_linear" x1="3" x2="21" y1="21" y2="3"><stop stop-color="#F58529"></stop><stop offset="0.5" stop-color="#DD2A7B"></stop><stop offset="1" stop-color="#8134AF"></stop></lineargradient><lineargradient gradientunits="userSpaceOnUse" id="paint2_linear" x1="16" x2="18" y1="8" y2="6"><stop stop-color="#F58529"></stop><stop offset="0.5" stop-color="#DD2A7B"></stop><stop offset="1" stop-color="#8134AF"></stop></lineargradient></defs></svg>
<span class="text-[14px] font-medium text-on-surface/80">Instagram</span>
</button>
<button class="flex items-center gap-2.5 px-md py-sm border border-outline-variant rounded-lg hover:border-slate-400 hover:bg-slate-50 transition-all text-left" type="button">
<svg class="w-[20px] h-[20px]" fill="#1877F2" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M24 12.073C24 5.405 18.627 0 12 0S0 5.405 0 12.073C0 18.099 4.388 23.094 10.125 24v-8.437H7.078v-3.49h3.047V9.43c0-3.007 1.791-4.668 4.532-4.668 1.312 0 2.686.234 2.686.234v2.953h-1.514c-1.49 0-1.955.925-1.955 1.874v2.25h3.328l-.532 3.49h-2.796V24C19.612 23.094 24 18.099 24 12.073z"></path></svg>
<span class="text-[14px] font-medium text-on-surface/80">Facebook</span>
</button>
<button class="flex items-center gap-2.5 px-md py-sm border border-outline-variant rounded-lg hover:border-slate-400 hover:bg-slate-50 transition-all text-left" type="button">
<svg class="w-[20px] h-[20px]" fill="#0A66C2" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"></path></svg>
<span class="text-[14px] font-medium text-on-surface/80">LinkedIn</span>
</button>
<button class="flex items-center gap-2.5 px-md py-sm border border-outline-variant rounded-lg hover:border-slate-400 hover:bg-slate-50 transition-all text-left" type="button">
<svg class="w-[18px] h-[18px]" fill="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M18.901 1.153h3.68l-8.04 9.19L24 22.846h-7.406l-5.8-7.584-6.638 7.584H.474l8.6-9.83L0 1.154h7.594l5.243 6.932L18.901 1.153ZM17.61 20.644h2.039L6.486 3.24H4.298l13.312 17.403Z"></path></svg>
<span class="text-[14px] font-medium text-on-surface/80">Twitter/X</span>
</button>
<button class="flex items-center gap-2.5 px-md py-sm border border-outline-variant rounded-lg hover:border-slate-400 hover:bg-slate-50 transition-all text-left" type="button">
<svg class="w-[20px] h-[20px]" fill="#FF0000" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"></path></svg>
<span class="text-[14px] font-medium text-on-surface/80">YouTube</span>
</button>
<button class="flex items-center gap-2.5 px-md py-sm border border-outline-variant rounded-lg hover:border-slate-400 hover:bg-slate-50 transition-all text-left" type="button">
<svg class="w-[20px] h-[20px]" fill="#BD081C" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12.017 0C5.396 0 .029 5.367.029 11.987c0 5.079 3.158 9.417 7.618 11.162-.105-.949-.199-2.403.041-3.439.219-.937 1.406-5.965 1.406-5.965s-.359-.719-.359-1.782c0-1.668.967-2.914 2.173-2.914 1.026 0 1.521.769 1.521 1.691 0 1.031-.657 2.573-.994 3.992-.285 1.196.6 2.174 1.78 2.174 2.135 0 3.778-2.249 3.778-5.495 0-2.873-2.064-4.882-5.012-4.882-3.414 0-5.418 2.561-5.418 5.207 0 1.031.397 2.138.893 2.738.098.119.112.224.083.345l-.333 1.36c-.053.22-.174.267-.402.161-1.499-.698-2.436-2.889-2.436-4.649 0-3.785 2.75-7.259 7.927-7.259 4.162 0 7.394 2.967 7.394 6.929 0 4.135-2.607 7.462-6.223 7.462-1.214 0-2.354-.63-2.745-1.373l-.749 2.853c-.27 1.031-1.002 2.324-1.492 3.119C9.516 23.811 10.74 24 12.017 24c6.621 0 12-5.378 12-12S18.638 0 12.017 0z"></path></svg>
<span class="text-[14px] font-medium text-on-surface/80">Pinterest</span>
</button></div>
</div>
<!-- CTA -->
<button class="w-full bg-primary text-white h-12 rounded-lg text-[16px] font-semibold hover:opacity-95 active:scale-[0.99] transition-all flex items-center justify-center" type="submit">
                    Create Account
                </button>
</form>
<!-- Footer -->
<div class="pt-lg border-t border-slate-100 flex justify-center">
<p class="text-[14px] text-slate-500">
                    Already have an account? 
                    <a class="text-primary font-semibold hover:underline" href="#">Sign In</a>
</p>
</div>
</div>
</main>
</body></html>
