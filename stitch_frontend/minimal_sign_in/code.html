<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #fbf8fc;
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-container-padding">
<!-- Auth Shell Suppression: No TopAppBar or BottomNavBar as per transactional journey rule -->
<main class="w-full max-w-[440px]">
<!-- Centered Card Layout -->
<div class="bg-surface-container-lowest rounded-xl p-xl shadow-[0px_4px_12px_rgba(0,0,0,0.03)] border border-surface-variant/50">
<!-- Heading -->
<div class="mb-xl">
<h1 class="font-headline-xl text-headline-xl text-primary mb-xs">Sign In</h1>
</div>
<!-- Form -->
<form action="#" class="flex flex-col gap-lg" method="POST">
<!-- Email Field -->
<div class="flex flex-col gap-xs">
<label class="font-label-bold text-label-bold text-on-surface-variant" for="email">Email</label>
<input class="w-full px-md py-md rounded-lg border border-outline-variant bg-surface-bright text-body-md font-body-md focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all placeholder:text-outline/50" id="email" name="email" placeholder="name@company.com" required="" type="email"/>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-xs">
<label class="font-label-bold text-label-bold text-on-surface-variant" for="password">Password</label>
<input class="w-full px-md py-md rounded-lg border border-outline-variant bg-surface-bright text-body-md font-body-md focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all placeholder:text-outline/50" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
<!-- Primary Button -->
<button class="w-full bg-primary text-on-primary font-label-bold text-body-lg py-md rounded-lg hover:opacity-90 active:scale-[0.98] transition-all duration-200 mt-md" type="submit">
                    Sign In
                </button>
</form>
<!-- Footer Text -->
<div class="mt-xl text-center">
<p class="font-body-md text-body-md text-on-surface-variant">
                    Don’t have an account? 
                    <a class="text-primary font-label-bold hover:underline" href="#">Sign Up</a>
</p>
</div>
</div>
<!-- Decorative Subtle Element (Hidden on small screens) -->
<div class="hidden lg:block fixed -bottom-10 -right-10 opacity-10">
<img alt="" class="w-64 h-auto grayscale rotate-12" data-alt="A clean and sophisticated abstract composition featuring soft geometric shapes and organic textures. The lighting is diffused and high-key, emphasizing a light-mode aesthetic that feels professional and calm. The palette is dominated by off-whites and soft creams with deep navy blue accents that provide a grounded, corporate feel. The mood is minimalist, organized, and focused on clarity." src="https://lh3.googleusercontent.com/aida/ADBb0ujLIo2tXXOSmsvcPByJg4RmDdJCtaUS19xFpDcM1D4WOF_6fK-e8zAAdFwr5OQa3PBM9aItSY9ZihrjEaTVHYf6H1H9Fw22UqTZvTIrpo5BWGiwuoPg_y0G7bxp5CXAEwCy9k9_0exfDPZUOtFuBVcyB4awS2IaSxQYNwMJUVuP58AGaCGvewf0GhQ2ejmDOAZQi8JXHln78s3kRuLLi14nKKbRPC6qvyf_IIlE131rW_KrgQjdSi1bDxOGYTKHG12YjfTreIisozA"/>
</div>
</main>
<!-- Background texture detail -->
<div class="fixed inset-0 -z-10 bg-[radial-gradient(#e4e2e5_1px,transparent_1px)] [background-size:32px_32px] opacity-30"></div>
</body></html>
