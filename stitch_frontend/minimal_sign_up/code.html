<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #fbf8fc; /* Soft Cream */
            font-family: 'Inter', sans-serif;
        }
    </style>

<body class="bg-background text-on-surface min-h-screen flex items-center justify-center p-md">
<!-- Suppression of Navigation Shell as per task (Transactional journey) -->
<main class="w-full max-w-[480px]">
<!-- Branding Logo / Header Anchor -->
<div class="flex justify-center mb-xl">
<h1 class="font-headline-xl text-headline-xl text-primary tracking-tight">SocialManager Pro</h1>
</div>
<!-- Signup Card -->
<div class="bg-surface-container-lowest rounded-xl shadow-[0px_4px_12px_rgba(0,0,0,0.03)] border border-outline-variant/20 p-xl flex flex-col gap-xl">
<div class="flex flex-col gap-xs">
<h2 class="font-headline-xl text-headline-xl text-primary">Sign Up</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Create your agency account to get started.</p>
</div>
<!-- Form Fields -->
<form class="flex flex-col gap-lg">
<div class="flex flex-col gap-md">
<!-- Full Name -->
<div class="flex flex-col gap-xs">
<label class="font-label-bold text-label-bold text-on-surface" for="fullname">Full name</label>
<input class="w-full h-11 px-md border border-outline-variant rounded-lg font-body-md text-body-md focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all bg-surface-container-low outline-none" id="fullname" placeholder="John Doe" type="text"/>
</div>
<!-- Email -->
<div class="flex flex-col gap-xs">
<label class="font-label-bold text-label-bold text-on-surface" for="email">Email</label>
<input class="w-full h-11 px-md border border-outline-variant rounded-lg font-body-md text-body-md focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all bg-surface-container-low outline-none" id="email" placeholder="john@agency.com" type="email"/>
</div>
<!-- Password -->
<div class="flex flex-col gap-xs">
<label class="font-label-bold text-label-bold text-on-surface" for="password">Password</label>
<input class="w-full h-11 px-md border border-outline-variant rounded-lg font-body-md text-body-md focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all bg-surface-container-low outline-none" id="password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Platform Selection -->
<div class="flex flex-col gap-md">
<h3 class="font-label-bold text-label-bold text-on-surface-variant uppercase tracking-wider">Select platforms</h3>
<div class="grid grid-cols-2 gap-sm">
<!-- Platform Buttons -->
<button class="flex items-center gap-sm px-md py-sm border border-outline-variant rounded-lg hover:bg-surface-container transition-colors group" type="button">
<span class="material-symbols-outlined text-[20px] text-outline group-hover:text-primary" data-icon="photo_camera">photo_camera</span>
<span class="font-body-md text-body-md text-on-surface">Instagram</span>
</button>
<button class="flex items-center gap-sm px-md py-sm border border-outline-variant rounded-lg hover:bg-surface-container transition-colors group" type="button">
<span class="material-symbols-outlined text-[20px] text-outline group-hover:text-primary" data-icon="facebook">social_leaderboard</span>
<span class="font-body-md text-body-md text-on-surface">Facebook</span>
</button>
<button class="flex items-center gap-sm px-md py-sm border border-outline-variant rounded-lg hover:bg-surface-container transition-colors group" type="button">
<span class="material-symbols-outlined text-[20px] text-outline group-hover:text-primary" data-icon="work">work</span>
<span class="font-body-md text-body-md text-on-surface">LinkedIn</span>
</button>
<button class="flex items-center gap-sm px-md py-sm border border-outline-variant rounded-lg hover:bg-surface-container transition-colors group" type="button">
<span class="material-symbols-outlined text-[20px] text-outline group-hover:text-primary" data-icon="close">close</span>
<span class="font-body-md text-body-md text-on-surface">Twitter/X</span>
</button>
<button class="flex items-center gap-sm px-md py-sm border border-outline-variant rounded-lg hover:bg-surface-container transition-colors group" type="button">
<span class="material-symbols-outlined text-[20px] text-outline group-hover:text-primary" data-icon="play_circle">play_circle</span>
<span class="font-body-md text-body-md text-on-surface">YouTube</span>
</button>
<button class="flex items-center gap-sm px-md py-sm border border-outline-variant rounded-lg hover:bg-surface-container transition-colors group" type="button">
<span class="material-symbols-outlined text-[20px] text-outline group-hover:text-primary" data-icon="push_pin">push_pin</span>
<span class="font-body-md text-body-md text-on-surface">Pinterest</span>
</button>
</div>
</div>
<!-- Primary Action -->
<button class="w-full bg-primary text-on-primary h-12 rounded-lg font-headline-md text-headline-md hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-sm" type="submit">
                    Create Account
                </button>
</form>
<!-- Bottom Link -->
<div class="pt-md border-t border-outline-variant/10 flex justify-center">
<p class="font-body-md text-body-md text-on-surface-variant">
                    Already have an account? 
                    <a class="text-primary font-bold hover:underline" href="#">Sign In</a>
</p>
</div>
</div>
<!-- Footer Visual Reference (Hidden/Decorative Contextual) -->
<div class="mt-xl flex justify-center items-center gap-md opacity-20">
<div class="w-8 h-8 rounded-full overflow-hidden bg-surface-container-highest">
<img alt="User profile context" class="w-full h-full object-cover" data-alt="A close-up, professional studio portrait of a confident woman in her early 30s with a warm smile, set against a clean, soft grey background. The lighting is diffused and professional, creating a polished corporate aesthetic. The overall mood is approachable, trustworthy, and modern, fitting for a premium social media management platform's user identity." src="https://lh3.googleusercontent.com/aida/ADBb0uiyDTxLulY7CukQTwM8-mLnxlzTnvYp78oUmWUPR5uaFksQWMfwL70VtiAXNX1Uzv_mxHse1c8WC7hRBMvwF-1DE3f07HnEko_0OjSmydCstYlKTwezwb7_0ylf3nmseUbLWIHIhKbIwflmxmct8nAC048wtTXy0HhXMZ9X295R9JaiDpMNeOC-Ipfi2IavvXFEKobHqNIITZC-GE7ccMNboECUFRQG4mh_l17AFzBd3UkltNJ393TSv93buaRTE5EJ6wbYTjv2ByY"/>
</div>
<div class="w-24 h-2 bg-surface-container-highest rounded-full"></div>
<div class="w-12 h-2 bg-surface-container-highest rounded-full"></div>
</div>
</main>
</body></html>
