<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries">
  const clientsData = [
    // Page 1
    { name: 'Luxe Hotels Group', status: 'Active', platforms: [{name: 'Instagram', icon: 'camera_alt', color: '#E4405F', value: '450K'}, {name: 'Facebook', icon: 'social_leaderboard', color: '#1877F2', value: '750K'}], posts: '4 Posts', img: '{{DATA:IMAGE:ID_0}}', logoType: 'img' },
    { name: 'SwiftEats Delivery', status: 'Pending', platforms: [{name: 'Instagram', icon: 'camera_alt', color: '#E4405F', value: '220K'}, {name: 'Twitter', icon: 'chat', color: '#1DA1F2', value: '230K'}], posts: '0 Posts', img: '{{DATA:IMAGE:ID_1}}', logoType: 'img' },
    { name: 'TechCore Solutions', status: 'Active', platforms: [{name: 'LinkedIn', icon: 'person_add', color: '#0A66C2', value: '1.2M'}, {name: 'Facebook', icon: 'social_leaderboard', color: '#1877F2', value: '1.6M'}], posts: '12 Posts', initials: 'TC', logoType: 'initials' },
    // Page 2
    { name: 'Eco-Ware Solutions', status: 'Active', platforms: [{name: 'Instagram', icon: 'camera_alt', color: '#E4405F', value: '120K'}, {name: 'Twitter', icon: 'chat', color: '#1DA1F2', value: '80K'}], posts: '15 Posts', initials: 'EW', logoType: 'initials' },
    { name: 'Peak Fitness', status: 'Active', platforms: [{name: 'Instagram', icon: 'camera_alt', color: '#E4405F', value: '310K'}, {name: 'Facebook', icon: 'social_leaderboard', color: '#1877F2', value: '200K'}], posts: '42 Posts', initials: 'PF', logoType: 'initials' },
    { name: 'Global Logistics', status: 'Pending', platforms: [{name: 'LinkedIn', icon: 'person_add', color: '#0A66C2', value: '500K'}, {name: 'Twitter', icon: 'chat', color: '#1DA1F2', value: '150K'}], posts: '8 Posts', initials: 'GL', logoType: 'initials' },
    // Page 3-6 (Placeholders generated programmatically for brevity in script)
    ...Array.from({ length: 12 }, (_, i) => ({
      name: `Client Alpha ${i + 7}`,
      status: i % 2 === 0 ? 'Active' : 'Pending',
      platforms: [{name: 'Instagram', icon: 'camera_alt', color: '#E4405F', value: '100K'}, {name: 'Facebook', icon: 'social_leaderboard', color: '#1877F2', value: '100K'}], 
      posts: '10 Posts',
      initials: 'CA',
      logoType: 'initials'
    }))
  ];

  let currentPage = 1;
  const itemsPerPage = 3;
  const totalPages = 6;

  function createCard(client) {
    const logo = client.logoType === 'img' 
      ? `<img alt="logo" class="w-full h-full object-cover" src="${client.img}"/>` 
      : `<div class="w-full h-full flex items-center justify-center bg-primary text-on-primary font-bold">${client.initials}</div>`;
    
    const statusClass = client.status === 'Active' 
      ? 'bg-teal-50 text-teal-700 border-teal-100' 
      : 'bg-tertiary-fixed text-on-tertiary-fixed border-transparent';

    const platformsHtml = client.platforms.map(p => `
      <div class="flex items-center justify-between text-[12px]">
<div class="flex items-center gap-xs">
<span class="material-symbols-outlined text-[16px]" style="color: ${p.color}">${p.icon}</span>
<span class="text-outline">${p.name}</span>
</div>
<span class="font-bold">${p.value}</span>
</div>
    `).join('');

    return `
      <div class="bg-surface-container-lowest rounded-xl border border-surface-container-high card-shadow overflow-hidden flex flex-col transition-transform hover:-translate-y-1">
<div class="p-lg">
<div class="flex justify-between items-start mb-md">
<div class="flex items-center gap-md">
<div class="w-12 h-12 rounded-full overflow-hidden border-2 border-surface-container">${logo}</div>
<div><h3 class="font-headline-md text-[16px] text-on-surface">${client.name}</h3><p class="text-[12px] text-outline">Connected to different platforms</p></div>
</div>
<span class="${statusClass} text-[10px] px-sm py-unit rounded font-bold border uppercase tracking-tighter">${client.status}</span>
</div>
<div class="flex flex-col gap-sm mb-lg">${platformsHtml}</div>
<div class="pt-sm border-t border-surface-container">
<p class="text-[10px] text-outline font-bold uppercase tracking-tight">Total Posts</p>
<p class="font-label-bold text-primary">${client.posts}</p>
</div>
</div>
<div class="mt-auto border-t border-surface-variant px-lg py-md flex items-center justify-center bg-surface-bright">
<a class="w-full bg-surface-container hover:bg-surface-container-high text-on-surface text-label-bold font-label-bold px-md py-sm rounded-md transition-colors text-center" href="client-dashboard.html">View Profile</a>
</div>
</div>`;
  }

  function goToPage(page) {
    if (page < 1 || page > totalPages) return;
    
    const grid = document.getElementById('client-grid');
    grid.classList.add('opacity-0');

    setTimeout(() => {
      currentPage = page;
      const start = (page - 1) * itemsPerPage;
      const end = start + itemsPerPage;
      const pageClients = clientsData.slice(start, end);
      
      grid.innerHTML = pageClients.map(createCard).join('');
      updatePaginationUI();
      grid.classList.remove('opacity-0');
    }, 300);
  }

  function updatePaginationUI() {
    const container = document.getElementById('pagination-container');
    const buttons = container.querySelectorAll('button');
    const infoText = container.querySelector('p');

    buttons.forEach((btn, idx) => {
      const val = btn.innerText.trim();
      if (val === 'chevron_left') {
        btn.onclick = () => goToPage(currentPage - 1);
        btn.style.opacity = currentPage === 1 ? '0.5' : '1';
        btn.disabled = currentPage === 1;
      } else if (val === 'chevron_right') {
        btn.onclick = () => goToPage(currentPage + 1);
        btn.style.opacity = currentPage === totalPages ? '0.5' : '1';
        btn.disabled = currentPage === totalPages;
      } else {
        const pageNum = parseInt(val);
        btn.onclick = () => goToPage(pageNum);
        if (pageNum === currentPage) {
          btn.className = 'w-8 h-8 rounded bg-primary text-on-primary font-bold text-sm';
        } else {
          btn.className = 'w-8 h-8 rounded hover:bg-surface-container-high text-on-surface transition-colors font-bold text-sm';
        }
      }
    });

    const start = (currentPage - 1) * itemsPerPage + 1;
    const end = Math.min(currentPage * itemsPerPage, 24);
    infoText.innerHTML = `Showing <span class="font-bold text-on-surface">${start} - ${end}</span> of <span class="font-bold text-on-surface">24</span> clients`;
  }

  document.addEventListener('DOMContentLoaded', () => goToPage(1));
</script>

      } else if (val === 'chevron_right') {
        btn.onclick = () => goToPage(currentPage + 1);
        btn.style.opacity = currentPage === totalPages ? '0.5' : '1';
        btn.disabled = currentPage === totalPages;
      } else {
        const pageNum = parseInt(val);
        btn.onclick = () => goToPage(pageNum);
        if (pageNum === currentPage) {
          btn.className = 'w-8 h-8 rounded bg-primary text-on-primary font-bold text-sm';
        } else {
          btn.className = 'w-8 h-8 rounded hover:bg-surface-container-high text-on-surface transition-colors font-bold text-sm';
        }
      }
    });

    const start = (currentPage - 1) * itemsPerPage + 1;
    const end = Math.min(currentPage * itemsPerPage, 24);
    infoText.innerHTML = `Showing <span class="font-bold text-on-surface">${start} - ${end}</span> of <span class="font-bold text-on-surface">24</span> clients`;
  }

  document.addEventListener('DOMContentLoaded', () => goToPage(1));
</script></body></html>
