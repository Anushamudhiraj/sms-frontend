<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-error-container": "#93000a",
                        "inverse-primary": "#b6c6ef",
                        "on-tertiary": "#ffffff",
                        "secondary-fixed-dim": "#cac6bd",
                        "on-primary": "#ffffff",
                        "primary": "#031635",
                        "on-primary-container": "#8293b8",
                        "background": "#fbf8fc",
                        "inverse-on-surface": "#f2f0f3",
                        "on-secondary-fixed": "#1c1c16",
                        "tertiary-fixed-dim": "#e8c08a",
                        "on-tertiary-fixed": "#291800",
                        "on-secondary-fixed-variant": "#484740",
                        "surface-container-lowest": "#ffffff",
                        "primary-fixed": "#d8e2ff",
                        "surface-container-low": "#f5f3f6",
                        "secondary-container": "#e6e2d8",
                        "on-primary-fixed-variant": "#364768",
                        "tertiary": "#231400",
                        "on-tertiary-fixed-variant": "#5d4217",
                        "on-tertiary-container": "#b08d5b",
                        "outline": "#75777f",
                        "primary-container": "#1a2b4b",
                        "on-secondary-container": "#66645d",
                        "surface-bright": "#fbf8fc",
                        "surface": "#fbf8fc",
                        "on-background": "#1b1b1e",
                        "error": "#ba1a1a",
                        "on-error": "#ffffff",
                        "on-surface": "#1b1b1e",
                        "on-primary-fixed": "#081b3a",
                        "error-container": "#ffdad6",
                        "inverse-surface": "#303033",
                        "surface-variant": "#e4e2e5",
                        "surface-tint": "#4e5e81",
                        "on-secondary": "#ffffff",
                        "on-surface-variant": "#44474e",
                        "surface-container": "#efedf0",
                        "tertiary-container": "#3e2700",
                        "secondary-fixed": "#e6e2d8",
                        "secondary": "#605e57",
                        "surface-container-highest": "#e4e2e5",
                        "surface-dim": "#dbd9dc",
                        "primary-fixed-dim": "#b6c6ef",
                        "outline-variant": "#c5c6cf",
                        "tertiary-fixed": "#ffddb1",
                        "surface-container-high": "#e9e7eb"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "xl": "32px",
                        "lg": "24px",
                        "unit": "4px",
                        "xs": "4px",
                        "container-padding": "24px",
                        "md": "16px",
                        "sm": "8px",
                        "gutter": "20px"
                    },
                    "fontFamily": {
                        "label-bold": ["Inter"],
                        "headline-xl": ["Manrope"],
                        "body-lg": ["Inter"],
                        "headline-md": ["Manrope"],
                        "body-md": ["Inter"],
                        "stat-lg": ["Manrope"]
                    },
                    "fontSize": {
                        "label-bold": ["12px", {"lineHeight": "16px", "letterSpacing": "0.02em", "fontWeight": "600"}],
                        "headline-xl": ["28px", {"lineHeight": "36px", "fontWeight": "700"}],
                        "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "headline-md": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                        "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                        "stat-lg": ["32px", {"lineHeight": "40px", "fontWeight": "700"}]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #fbf8fc;
            color: #1b1b1e;
        }
        .login-card-shadow {
            box-shadow: 0px 4px 12px rgba(0,0,0,0.03);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-lg font-body-md text-body-md bg-background">
<!-- Main Container -->
<main class="w-full max-w-[400px] flex flex-col gap-xl">
<!-- Header / Logo Area -->
<div class="flex flex-col items-center text-center gap-sm">
<div class="w-16 h-16 rounded-xl bg-primary flex items-center justify-center mb-md">
<span class="material-symbols-outlined text-on-primary text-[32px]" data-icon="dashboard">dashboard</span>
</div>
<h1 class="font-headline-xl text-headline-xl text-primary tracking-tight">SocialManager Pro</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Sign in to manage your agency accounts</p>
</div>
<!-- Sign-In Card -->
<div class="bg-surface-container-lowest login-card-shadow rounded-xl p-lg border border-surface-variant/50">
<form class="flex flex-col gap-lg">
<!-- Email Field -->
<div class="flex flex-col gap-xs">
<label class="font-label-bold text-label-bold text-on-surface ml-xs" for="email">Email Address</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-md flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-[20px]" data-icon="mail">mail</span>
</div>
<input class="w-full pl-[44px] pr-md py-md bg-surface border border-outline-variant rounded-lg font-body-md text-body-md focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all placeholder:text-outline/60" id="email" name="email" placeholder="name@agency.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-xs">
<div class="flex justify-between items-center px-xs">
<label class="font-label-bold text-label-bold text-on-surface" for="password">Password</label>
<a class="font-label-bold text-label-bold text-primary hover:underline" href="#">Forgot?</a>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-md flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-[20px]" data-icon="lock">lock</span>
</div>
<input class="w-full pl-[44px] pr-[44px] py-md bg-surface border border-outline-variant rounded-lg font-body-md text-body-md focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all placeholder:text-outline/60" id="password" name="password" placeholder="Enter your password" type="password"/>
<button class="absolute inset-y-0 right-0 pr-md flex items-center text-outline hover:text-on-surface" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center gap-sm px-xs">
<input class="w-4 h-4 rounded border-outline-variant text-primary focus:ring-primary" id="remember" type="checkbox"/>
<label class="font-body-md text-body-md text-on-surface-variant cursor-pointer" for="remember">Stay signed in for 30 days</label>
</div>
<!-- Submit Button -->
<button class="w-full bg-primary text-on-primary py-md rounded-lg font-label-bold text-body-lg hover:bg-primary-container transition-colors shadow-sm active:scale-[0.98]" type="submit">
                    Sign In
                </button>
</form>
<!-- Social Provider Splitter -->
<div class="relative my-xl flex items-center">
<div class="flex-grow border-t border-outline-variant"></div>
<span class="flex-shrink mx-md font-label-bold text-label-bold text-outline uppercase tracking-widest">or continue with</span>
<div class="flex-grow border-t border-outline-variant"></div>
</div>
<!-- Social Buttons -->
<div class="grid grid-cols-2 gap-md">
<button class="flex items-center justify-center gap-sm py-md border border-outline-variant rounded-lg bg-surface hover:bg-surface-container-low transition-colors">
<img class="w-5 h-5 object-contain" data-alt="A clean, high-resolution graphic of a modern tech logo with minimalist aesthetic, set against a pristine white background. The image has a professional corporate feel with sharp lines and balanced composition, using a palette of deep navy and soft neutrals to match a premium agency interface style." src="https://lh3.googleusercontent.com/aida/ADBb0ujLIo2tXXOSmsvcPByJg4RmDdJCtaUS19xFpDcM1D4WOF_6fK-e8zAAdFwr5OQa3PBM9aItSY9ZihrjEaTVHYf6H1H9Fw22UqTZvTIrpo5BWGiwuoPg_y0G7bxp5CXAEwCy9k9_0exfDPZUOtFuBVcyB4awS2IaSxQYNwMJUVuP58AGaCGvewf0GhQ2ejmDOAZQi8JXHln78s3kRuLLi14nKKbRPC6qvyf_IIlE131rW_KrgQjdSi1bDxOGYTKHG12YjfTreIisozA"/>
<span class="font-label-bold text-label-bold text-on-surface">Google</span>
</button>
<button class="flex items-center justify-center gap-sm py-md border border-outline-variant rounded-lg bg-surface hover:bg-surface-container-low transition-colors">
<span class="material-symbols-outlined text-[20px] text-on-surface" data-icon="apple">ios</span>
<span class="font-label-bold text-label-bold text-on-surface">Apple</span>
</button>
</div>
</div>
<!-- Footer Links -->
<div class="text-center">
<p class="font-body-md text-body-md text-on-surface-variant">
                Don't have an agency account? 
                <a class="font-label-bold text-label-bold text-primary hover:underline ml-xs" href="#">Sign Up</a>
</p>
</div>
<!-- Decorative Background Element (Simulating the 'Success' or Identity aspect of the ref) -->
<div class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-lg h-64 -z-10 opacity-10 pointer-events-none">
<img class="w-full h-full object-cover" data-alt="A wide, sweeping digital canvas featuring abstract waves of soft cream and deep navy gradients. The lighting is diffused and professional, creating a sense of calm reliability and high-end corporate efficiency. The visual style is minimalist and clean, providing a sophisticated backdrop for a modern agency software application." src="https://lh3.googleusercontent.com/aida/ADBb0ujKwsanRkXbzZCQusaDz-_CSHISAe6etTFauis1hwR7LCfLX2w7FhlibgvuvJJD1YdbOEw06R_jz673DTK3i2mI1EmFKQtLcx3eIZRUN1To9apWENwOYyjOfm9PDG6x9yT2MwwRr_BW4rl8ILysYNoCbIo1_JiJV3QNItoX0-c8n8V_VBikY904NU-ZLWSAT_mZXVB-0YhIFngMIKZJCBNkaeY5EIepGlzWq7TkYpGDQNXUneW38oVKFC5mMgWRzH_lg7p0bRriG8s"/>
</div>
</main>
</body></html>
